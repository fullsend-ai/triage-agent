---
agent: agents/prioritize.md
doc: docs/prioritize.md
model: opus
image: ghcr.io/fullsend-ai/fullsend-sandbox:latest
policy: policies/prioritize.yaml

role: prioritize
slug: fullsend-ai-prioritize

host_files:
  - src: common/env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: env/prioritize.env
    dest: /sandbox/workspace/.env.d/prioritize.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true

pre_script: scripts/pre-prioritize.sh
post_script: scripts/post-prioritize.sh

validation_loop:
  script: scripts/validate-output-schema.sh
  schema: schemas/prioritize-result.schema.json
  max_iterations: 2

timeout_minutes: 10

forge:
  github:
    pre_script: scripts/pre-prioritize.sh
    post_script: scripts/post-prioritize.sh
    env:
      runner:
        GITHUB_ISSUE_URL: ${GITHUB_ISSUE_URL}
        GH_TOKEN: ${GH_TOKEN}
        ORG: ${ORG}
        PROJECT_NUMBER: ${PROJECT_NUMBER}
      sandbox:
        GITHUB_ISSUE_URL: "${GITHUB_ISSUE_URL}"
        GH_TOKEN: "${GH_TOKEN}"
