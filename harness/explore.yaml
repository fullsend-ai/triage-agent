---
doc: docs/explore.md
agent: agents/explore.md
model: opus
image: ghcr.io/fullsend-ai/fullsend-sandbox:latest
policy: policies/explore.yaml

role: explore
slug: fullsend-ai-explore

host_files:
  - src: common/env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: env/explore.env
    dest: /sandbox/workspace/.env.d/explore.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true
  - src: /tmp/workspace/issue-context.json
    dest: /tmp/workspace/issue-context.json
    optional: true
  - src: /tmp/workspace/referenced-repos.tar.gz
    dest: /sandbox/workspace/referenced-repos.tar.gz
    optional: true
  - src: /tmp/workspace/referenced-repos-manifest.json
    dest: /sandbox/workspace/referenced-repos-manifest.json
    optional: true

skills:
  - skills/public-research
  - skills/jira-read

pre_script: scripts/pre-explore.sh
post_script: scripts/post-explore.sh

validation_loop:
  script: scripts/validate-output-schema.sh
  schema: schemas/explore-result.schema.json
  max_iterations: 2

env:
  runner:
    ISSUE_KEY: ${ISSUE_KEY}
    ISSUE_SOURCE: ${ISSUE_SOURCE}
    REPO_FULL_NAME: ${REPO_FULL_NAME}
    GITHUB_ISSUE_NUMBER: ${GITHUB_ISSUE_NUMBER}
    GH_TOKEN: ${GH_TOKEN}
    JIRA_HOST: ${JIRA_HOST}
    JIRA_EMAIL: ${JIRA_EMAIL}
    JIRA_API_TOKEN: ${JIRA_API_TOKEN}
    EXPLORE_CONFIDENCE_THRESHOLD: ${EXPLORE_CONFIDENCE_THRESHOLD}
    EXPLORE_READY_LABEL: ${EXPLORE_READY_LABEL}
    EXPLORE_NEEDS_INFO_LABEL: ${EXPLORE_NEEDS_INFO_LABEL}
    REFERENCED_REPOS_DIR: /sandbox/workspace/referenced-repos
    FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/explore-result.schema.json
  sandbox:
    ISSUE_KEY: "${ISSUE_KEY}"
    ISSUE_SOURCE: "${ISSUE_SOURCE}"
    REPO_FULL_NAME: "${REPO_FULL_NAME}"

timeout_minutes: 20
